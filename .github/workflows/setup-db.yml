name: Setup Database

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: brew install postgresql@16

      - name: Execute SQL Setup
        env:
          PGPASSWORD: '@1412Yasser@'
        run: |
          echo "Testing IPv6 connectivity..."
          ping6 -c 1 -W 3 google.com 2>/dev/null && echo "IPv6 available!" || echo "IPv6 not available"
          
          echo "Connecting to Supabase database..."
          psql "postgresql://postgres:@db.ucmpclgctjeyoimtmqir.supabase.co:5432/postgres?sslmode=require" -f supabase/setup.sql 2>&1
          
          echo "Verifying tables..."
          psql "postgresql://postgres:@db.ucmpclgctjeyoimtmqir.supabase.co:5432/postgres?sslmode=require" -c "
            SELECT table_name FROM information_schema.tables 
            WHERE table_schema='public' AND table_type='BASE TABLE'
            ORDER BY table_name;
          " 2>&1 || true

      - name: Verify Tables
        env:
          PGPASSWORD: '@1412Yasser@'
        run: |
          psql "postgresql://postgres:@db.ucmpclgctjeyoimtmqir.supabase.co:5432/postgres?sslmode=require" -c "
            SELECT table_name FROM information_schema.tables 
            WHERE table_schema='public' AND table_type='BASE TABLE';
          " 2>&1 || echo "Verification attempted"
