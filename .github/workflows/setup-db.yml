name: Setup Database

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable IPv6 and Execute SQL
        env:
          DB_HOST: db.ucmpclgctjeyoimtmqir.supabase.co
          DB_PASSWORD: '@1412Yasser@'
        run: |
          # Try to enable IPv6 on the runner
          sudo modprobe ipv6 2>/dev/null || true
          
          # Check IPv6 connectivity
          ping6 -c 1 -W 2 google.com 2>/dev/null && echo "IPv6 available" || echo "IPv6 not available"
          
          # Install psql
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client python3-pip
          pip install psycopg2-binary
          
          # Try direct connection
          echo "Trying direct IPv6 connection..."
          PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -U postgres -d postgres -f supabase/setup.sql 2>&1 || {
            echo "Direct connection failed, trying Python psycopg2..."
            python3 -c "
          import psycopg2, sys
          try:
              conn = psycopg2.connect(
                  host='$DB_HOST', port=5432, dbname='postgres',
                  user='postgres', password='$DB_PASSWORD', sslmode='require',
                  connect_timeout=10
              )
              with open('supabase/setup.sql', 'r') as f:
                  sql = f.read()
              cur = conn.cursor()
              cur.execute(sql)
              conn.commit()
              print('SQL executed successfully!')
              cur.close()
              conn.close()
          except Exception as e:
              print(f'Python connection also failed: {e}')
              sys.exit(1)
          "
          }
          
          echo "SQL execution attempt completed"
